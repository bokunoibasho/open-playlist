name: OpenPlaylist

options:
  bundleIdPrefix: com.openplaylist
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

targets:
  OpenPlaylist:
    type: application
    platform: iOS
    sources:
      - App
      - path: Vendor/Brave/UserScripts
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openplaylist.app
        PRODUCT_NAME: OpenPlaylist
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.8.1"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Open Playlist
        CFBundleLocalizations:
          - en
          - ja
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
